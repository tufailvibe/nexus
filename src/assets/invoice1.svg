<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" width="100%" height="100%">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .brand-blue { fill: #2c4284; }
      .brand-dark { fill: #231f20; }
      
      .text-en-main {
        font-family: 'Montserrat', system-ui, -apple-system, sans-serif;
        font-weight: 800;
        font-size: 22px;
      }
      .text-en-sub {
        font-family: 'Montserrat', system-ui, -apple-system, sans-serif;
        font-weight: 700;
