  <text x="302" y="185" class="brand-blue text-en-sub" text-anchor="middle">General Trading Co.</text>
  
  <text x="300" y="240" class="brand-dark text-ar" text-anchor="middle" direction="rtl">شركة الغانم جلوبال للتجاره العامه</text>
  <text x="300" y="275" class="brand-dark text-en-bottom" text-anchor="middle">Al Ghanim Global General Trading Co.</text>
