<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 220" role="img" aria-label="Arabic golden teardrop emblem">
  <defs>
    <linearGradient id="royalGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff6cb"/>
      <stop offset="18%" stop-color="#f8df88"/>
      <stop offset="44%" stop-color="#ddb14a"/>
      <stop offset="72%" stop-color="#b77d17"/>
      <stop offset="100%" stop-color="#fff0b0"/>
    </linearGradient>
    <filter id="goldGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.78 0 0 0 0 0.56 0 0 0 0 0.15 0 0 0 0.48 0" result="warm"/>
      <feMerge>
        <feMergeNode in="warm"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .outline {
        fill: none;
        stroke: url(#royalGold);
        stroke-width: 4.5;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .accent {
        fill: none;
        stroke: url(#royalGold);
        stroke-width: 3;
        stroke-linecap: round;
        opacity: 0.92;
      }
      .main {
        font-family: "Traditional Arabic", "Noto Naskh Arabic", "Amiri", serif;
        font-size: 54px;
        font-weight: 700;
      }
      .sub {
        font-family: "Traditional Arabic", "Noto Naskh Arabic", "Amiri", serif;
        font-size: 28px;
        font-weight: 700;
      }
      .fill {
        fill: url(#royalGold);
      }
    </style>
  </defs>

  <g filter="url(#goldGlow)">
    <path class="accent" d="M86 108c24-18 46-26 70-26"/>
    <path class="accent" d="M334 108c-24-18-46-26-70-26"/>
    <path class="accent" d="M86 112c24 18 46 26 70 26"/>
    <path class="accent" d="M334 112c-24 18-46 26-70 26"/>

    <path class="outline" d="M210 24c34 0 63 13 81 37 15 20 21 46 16 73-9 40-37 65-97 83-60-18-88-43-97-83-5-27 1-53 16-73 18-24 47-37 81-37Z"/>
    <path class="accent" d="M210 40c28 0 52 11 67 31 12 16 17 36 13 58-6 28-26 48-80 66-54-18-74-38-80-66-4-22 1-42 13-58 15-20 39-31 67-31Z"/>

    <text x="210" y="98" text-anchor="middle" direction="rtl" unicode-bidi="plaintext" class="fill main">&#x0628;&#x0650;&#x0633;&#x0652;&#x0645;&#x0650; &#x0627;&#x0644;&#x0644;&#x0647;</text>
    <text x="210" y="128" text-anchor="middle" direction="rtl" unicode-bidi="plaintext" class="fill sub">&#x0627;&#x0644;&#x0631;&#x0651;&#x064E;&#x062D;&#x0652;&#x0645;&#x0670;&#x0646;&#x0650; &#x0627;&#x0644;&#x0631;&#x0651;&#x064E;&#x062D;&#x0650;&#x064A;&#x0652;&#x0645;&#x0650;</text>

    <path class="accent" d="M170 150c14 8 27 12 40 12s26-4 40-12"/>
    <circle class="fill" cx="210" cy="18" r="3.8"/>
    <circle class="fill" cx="210" cy="172" r="3.8"/>
  </g>
</svg>
