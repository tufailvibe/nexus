<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 250" width="100%" height="100%">
  <defs>
    <style>
      .al-blue { fill: #1a3476; }
      .text-ar {
        font-family: 'Noto Naskh Arabic', 'Traditional Arabic', 'Segoe UI', Tahoma, sans-serif;
        font-size: 40px;
        font-weight: 700;
      }
      .text-en {
        font-family: 'Montserrat', 'Segoe UI', system-ui, sans-serif;
        font-size: 24px;
        font-weight: 700;
        letter-spacing: 0.08em;
      }
    </style>
  </defs>

  <!-- GD Interlock Mark -->
  <g transform="translate(100, 78) scale(0.48)">
    <path class="al-blue" d="
