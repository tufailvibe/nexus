      L -10 80.04
      L -10 12
      L -46 12
      L -46 38.52
      A 60 60 0 0 1 -10 -59.16
      Z
    "/>
    <path class="al-blue" d="
      M 10 94.04
      L 34 94.04
      A 100 100 0 0 0 34 -94.04
      L 24 -94.04
      L 10 -80.04
      L 10 -12
      L 46 -12
      L 46 -38.52
      A 60 60 0 0 1 10 59.16
      Z
    "/>
  </g>

  <!-- Arabic: الغانم -->
  <text x="100" y="182" class="al-blue text-ar" text-anchor="middle" direction="rtl" xml:lang="ar">الغـــانــم</text>

  <!-- English: Nexus -->
  <text x="100" y="218" class="al-blue text-en" text-anchor="middle">Nexus</text>
